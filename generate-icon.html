<!DOCTYPE html>
<html>
<head>
  <title>Generate AWL Icon</title>
</head>
<body>
  <h1>AWL Icon Generator - 12-Point Sun</h1>
  <p>Click the button to download the icon as PNG (180x180 for iPhone)</p>
  <canvas id="canvas" width="180" height="180" style="border: 1px solid #ccc; margin: 20px 0;"></canvas>
  <br>
  <button onclick="downloadIcon('sun-icon2')" style="padding: 10px 20px; font-size: 16px;">Download sun-icon2.png</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const size = 180;

    // Green background with rounded corners
    ctx.fillStyle = '#0f7a3f';
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, 28);
    ctx.fill();

    // Draw 12-point starburst
    const cx = size / 2;
    const cy = size / 2;
    const outerR = size * 0.47;  // ~85
    const innerR = size * 0.32;  // ~57
    const points = 12;

    ctx.fillStyle = '#d9b44a';
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const angle = (Math.PI * 2 * i) / (points * 2) - Math.PI / 2;
      const r = i % 2 === 0 ? outerR : innerR;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();

    function downloadIcon(name) {
      const link = document.createElement('a');
      link.download = name + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
